apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: icc-webui
  namespace: argocd
spec:
  project: default
  destination:
    name: kind-testing
    namespace: icc
  source:
    repoURL: https://github.com/jevzib/icc-webui.git
    path: testing/charts/icc-webui
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true